# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Python app to Azure Web App - backendwebapp

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "requirements.txt"
      - "pyproject.toml"
      - "data/ingestion/sec/extracted_10k_sections.json"
      - ".github/workflows/main_backendwebapp.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PYTHON_VERSION: "3.11"
  AZURE_WEBAPP_NAME: "backendwebapp"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run backend regression tests
        run: |
          pytest backend/tests/test_config.py backend/tests/test_dependencies.py backend/tests/api -q

      - name: Prepare deployment package
        run: |
          mkdir -p backend-release
          cp -R backend backend-release/backend
          cp requirements.txt pyproject.toml backend-release/
          if [ -f data/ingestion/sec/extracted_10k_sections.json ]; then
            mkdir -p backend-release/data/ingestion/sec
            cp data/ingestion/sec/extracted_10k_sections.json backend-release/data/ingestion/sec/
          fi

      - name: Login to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_DA12E4DF6DA64D9A8937073CAF043969 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_595B62F5381B47338307574970A52987 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_B484D8788A80419EAB25C23C11B02AB5 }}

      - name: Configure Azure Web App startup
        run: |
          RESOURCE_GROUP=$(az webapp list --query "[?name=='${{ env.AZURE_WEBAPP_NAME }}'].resourceGroup | [0]" -o tsv)
          if [ -z "$RESOURCE_GROUP" ]; then
            echo "Unable to resolve resource group for ${{ env.AZURE_WEBAPP_NAME }}"
            exit 1
          fi
          az webapp config set \
            --resource-group "$RESOURCE_GROUP" \
            --name "${{ env.AZURE_WEBAPP_NAME }}" \
            --startup-file "sh backend/startup.sh"
          az webapp config appsettings set \
            --resource-group "$RESOURCE_GROUP" \
            --name "${{ env.AZURE_WEBAPP_NAME }}" \
            --settings SCM_DO_BUILD_DURING_DEPLOYMENT=true

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: Production
          package: backend-release
