name: Deploy frontend to Azure Web App

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: "20"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ vars.AZURE_BACKEND_BASE_URL }}
        run: npm run build

      - name: Prepare frontend package
        run: |
          mkdir -p frontend-release/dist
          cp -R frontend/dist/. frontend-release/dist/
          cp frontend/server.cjs frontend/package.json frontend-release/

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Configure frontend web app startup
        run: |
          az webapp config set \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.AZURE_FRONTEND_WEBAPP_NAME }}" \
            --startup-file "node server.cjs"

      - name: Deploy frontend package
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_FRONTEND_WEBAPP_NAME }}
          package: frontend-release
